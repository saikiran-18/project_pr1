<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraDesk - Login</title>
    <link href="css/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
                <div class="logo-icon">C</div>
                <h2>AuraDesk</h2>
            </div>
            
            <div class="tab-switcher" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <button id="tab-login" class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="error-msg" id="loginError" style="color: #ff6b6b; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>
                <button type="submit" class="primary-btn">Login</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="error-msg" id="regError" style="color: #ff6b6b; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>
                <button type="submit" class="primary-btn">Register</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
